<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width= device-width, initial-scale=1.0">
    <title>Conditional statements in JS</title>
</head>
<body>
    <script>
        // conditional statements :

       //if ...... else
       let myAge=12;
       if(myAge>=18) {
        console.log("valid age for vote casting!");
       }
       else{
        console.log("Not valid age!");
       }

       //switch case..... 
       let grade='A';
       switch(grade) {
        case 'A' : result="First Division";
        break;
        case 'B' : result="second division";
        break;
        case 'C' : result="Third division";
        break;
        default: result="fail";
       }
      console.log(result);

      //if ... elseif... else

      let marks=24;
      if(marks>=60) {
        console.log("First division marks");
      }
      else if (marks<59 && marks>40) {
        console.log("Second division marks");
      }
       else {
        console.log("Third division marks");
       }


    </script>
    
</body>
</html>
