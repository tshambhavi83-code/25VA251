<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>
     <link rel="stylesheet" href="index.css">
</head>
<style>
body{
font-family: Arial;
background-color:#f2f2f2;
text-align:center;
padding:40px;
}
.container{
background:white;
padding:25px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}
input{
padding:8px;
width:80%;
margin-top:5px;
}
button{
padding:10px 20px;
background-color:blue;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
button:hover{
background-color:darkblue;
}
#result{
margin-top:20px;
font-weight:bold;
font-size:18px;
}
</style>

<script>
    function calculateResult(){
let n = document.getElementById("subjects").value;
let total = 0;
for(let i=1;i<=n;i++){
let marks = parseFloat(prompt("Enter marks for Subject " + i));
total = total + marks;
}
let average = total / n;
let grade;
let result;
if(average >= 90){
grade = "A+";
}
else if(average >= 75){
grade = "A";
}
else if(average >= 60){
grade = "B";
}
else if(average >= 50){
grade = "C";
}
else{
grade = "F";
}
if(average >= 40){
result = "PASS";
}
else{
result = "FAIL";
}
document.getElementById("result").innerHTML =
"Total Marks: " + total + "<br>" +
"Average Marks: " + average.toFixed(2) + "<br>" +
"Grade: " + grade + "<br>" +
"Result: " + result;
}
</script>
<body>
      <div class="container">
<h2>Student Result Calculator</h2>
<label>Enter Number of Subjects</label>
<input type="number" id="subjects" placeholder="Enter Number of Subjects"><br><br>
<button onclick="calculateResult()">Calculate Result</button>
<div id="result"></div>
</div>
    <script src="main.js"></script>
    
</body>
</html>
