<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 id="display"></h2>
    <input type="text" id="myName" placeholder="enter your name">
    <button onclick="show()">Show name</button>
    <script>

        function show() {
            let name=document.getElementById("myName").value;
            document.getElementById("display").innerHTML=name;
        }
    </script>
    
</body>
</html>
